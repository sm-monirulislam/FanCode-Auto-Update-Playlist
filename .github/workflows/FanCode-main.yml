name: Auto Update FanCode playlist

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"   # প্রতি ৩০ মিনিটে run

permissions:
  contents: write

jobs:
  secure-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install 7zip
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Unzip Python Script (AES256)
        run: |
          7z x FanCode_sm.zip -p"${{ secrets.ZIP_PASSWORD }}" -y

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install requests pytz

      - name: Run Python Script
        run: |
          python fancode_sm.py

      - name: Delete Python Script After Run
        run: |
          rm -f fancode_sm.py

      - name: Commit & Push Output Files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git pull
          git add FanCode.m3u FanCode_data.json
          git diff --cached --quiet || git commit -m "Auto Update FanCode - $(date +'%Y-%m-%d %H:%M:%S')"
          git push
